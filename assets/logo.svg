<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="512" height="512">
  <defs>
    <!-- GNOME Adwaita Blue Gradient (Represents Luau/Roblox ecosystem) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3584e4" /> <!-- GNOME @blue_3 -->
      <stop offset="100%" stop-color="#1a5fb4" /> <!-- GNOME @blue_5 -->
    </linearGradient>
    
    <!-- Top Highlight for a 3D tactile feel -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.4)" />
      <stop offset="25%" stop-color="rgba(255,255,255,0.05)" />
      <stop offset="100%" stop-color="rgba(255,255,255,0)" />
    </linearGradient>

    <!-- Drop Shadow for Floating Elements -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.25" />
      <feDropShadow dx="0" dy="1" stdDeviation="1" flood-color="#000000" flood-opacity="0.15" />
    </filter>

    <filter id="shadow-deep" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000000" flood-opacity="0.35" />
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000000" flood-opacity="0.2" />
    </filter>
  </defs>

  <!-- 1. BASE BACKGROUND: GNOME Squircle shape -->
  <g filter="url(#shadow-deep)">
    <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#bgGrad)" />
  </g>
  
  <!-- Add top lighting and bottom darkening to the base shape -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#highlightGrad)" />
  <!-- Inner lighting border -->
  <rect x="9" y="9" width="110" height="110" rx="23" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="1" />
  <!-- Bottom shadow rim -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="none" stroke="rgba(0,0,0,0.3)" stroke-width="1" />

  <!-- 2. LUAU / ROBLOX REFERENCE: A tilted central square -->
  <g filter="url(#shadow)" transform="translate(64,64) rotate(-15) translate(-64,-64)">
    <rect x="36" y="36" width="56" height="56" rx="8" fill="#ffffff" />
    <!-- Gradient to make the square slightly tactile -->
    <rect x="36" y="36" width="56" height="56" rx="8" fill="url(#highlightGrad)" opacity="0.6" />
    <rect x="37" y="37" width="54" height="54" rx="7" fill="none" stroke="rgba(255,255,255,1)" stroke-width="1.5" />
  </g>

  <!-- 3. LISP REFERENCE: Lambda symbol carved inside the tilted square -->
  <g transform="translate(64,64) rotate(-15) translate(-64,-64)">
    <!-- Draw the Lambda symbol (λ) -->
    <path d="M 58,46 C 60,38 72,38 74,48 L 82,82 L 72,82 L 68,64 L 56,82 L 46,82 L 64,56 L 58,46 Z" 
          fill="#1a5fb4" stroke="#1a5fb4" stroke-width="2" stroke-linejoin="round" />
  </g>

  <!-- 4. LISP REFERENCE: Elegant Parentheses flanking the center -->
  <g filter="url(#shadow)">
    <!-- Left parenthesis -->
    <path d="M 28,34 C 14,54 14,74 28,94" stroke="#ffffff" fill="none" stroke-width="6" stroke-linecap="round" opacity="0.9" />
    <!-- Right parenthesis -->
    <path d="M 100,34 C 114,54 114,74 100,94" stroke="#ffffff" fill="none" stroke-width="6" stroke-linecap="round" opacity="0.9" />
  </g>

</svg>
