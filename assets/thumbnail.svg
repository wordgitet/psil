<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e1e" />
      <stop offset="100%" stop-color="#000000" />
    </linearGradient>
    
    <linearGradient id="logoBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3584e4" />
      <stop offset="100%" stop-color="#1a5fb4" />
    </linearGradient>

    <filter id="shadowHeavy" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="32" stdDeviation="32" flood-color="#000000" flood-opacity="0.6" />
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.3" />
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bgDark)" />
  
  <g stroke="rgba(255,255,255,0.02)" stroke-width="2">
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" />
    </pattern>
    <rect width="1920" height="1080" fill="url(#grid)" />
  </g>

  <!-- LEFT SIDE: The Glowing Logo & Typography -->
  <g transform="translate(180, 240)">
    <g transform="scale(3)" filter="url(#shadowHeavy)">
      <rect x="8" y="8" width="112" height="112" rx="24" fill="url(#logoBg)" />
      <rect x="9" y="9" width="110" height="110" rx="23" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1" />
      
      <g transform="translate(64,64) rotate(-15) translate(-64,-64)">
        <rect x="36" y="36" width="56" height="56" rx="8" fill="#ffffff" />
        <rect x="37" y="37" width="54" height="54" rx="7" fill="none" stroke="rgba(0,0,0,0.1)" stroke-width="1.5" />
        <path d="M 58,46 C 60,38 72,38 74,48 L 82,82 L 72,82 L 68,64 L 56,82 L 46,82 L 64,56 L 58,46 Z" fill="#1a5fb4" />
      </g>
      
      <path d="M 28,34 C 14,54 14,74 28,94" stroke="#ffffff" fill="none" stroke-width="6" stroke-linecap="round" />
      <path d="M 100,34 C 114,54 114,74 100,94" stroke="#ffffff" fill="none" stroke-width="6" stroke-linecap="round" />
    </g>

    <text x="0" y="520" font-family="sans-serif" font-weight="900" font-size="120" fill="#ffffff">Psil</text>
    <text x="5" y="590" font-family="sans-serif" font-weight="600" font-size="38" fill="#9a9a9a">A Scheme-first Lisp</text>
    <text x="5" y="640" font-family="sans-serif" font-weight="600" font-size="38" fill="#9a9a9a">for Luau &amp; Roblox</text>
  </g>

  <!-- RIGHT SIDE: The Custom Roblox Psil UI Mockup based on User Editor! -->
  <g transform="translate(760, 180)" filter="url(#shadowHeavy)">
    <rect width="1020" height="720" rx="16" fill="#1c2024" stroke="#30363d" stroke-width="2" />
    
    <g transform="translate(20, 20)">
      <g transform="translate(24, 24) rotate(-15) translate(-24,-24)">
        <rect x="8" y="8" width="32" height="32" rx="6" fill="#ffffff" />
        <rect x="17" y="17" width="14" height="14" rx="2" fill="#1c2024" />
      </g>
      <g stroke="#d3d7cf" stroke-width="4" stroke-linecap="round">
        <line x1="70" y1="14" x2="94" y2="14" />
        <line x1="70" y1="24" x2="94" y2="24" />
        <line x1="70" y1="34" x2="94" y2="34" />
      </g>
      
      <rect x="130" y="4" width="110" height="40" rx="6" fill="#3b82f6" />
      <text x="185" y="30" font-family="sans-serif" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">Editor</text>
      
      <rect x="250" y="4" width="90" height="40" rx="6" fill="#2d333b" />
      <text x="295" y="30" font-family="sans-serif" font-weight="bold" font-size="16" fill="#9ca3af" text-anchor="middle">REPL</text>

      <rect x="880" y="4" width="100" height="40" rx="6" fill="#f59e0b" />
      <text x="930" y="30" font-family="sans-serif" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">Reset</text>
    </g>

    <g transform="translate(20, 80)">
      <rect width="980" height="480" rx="6" fill="#111418" stroke="#30363d" stroke-width="2" />
      <line x1="70" y1="0" x2="70" y2="480" stroke="#30363d" stroke-width="2" />
      
      <g font-family="monospace" font-size="22" fill="#484f58" text-anchor="end">
        <text x="50" y="40">1</text>
        <text x="50" y="76">2</text>
        <text x="50" y="112">3</text>
        <text x="50" y="148">4</text>
        <text x="50" y="184">5</text>
        <text x="50" y="220">6</text>
        <text x="50" y="256">7</text>
      </g>

      <g font-family="monospace" font-size="22" fill="#d3d7cf">
        <text x="90" y="40" fill="#8b949e">;; Psil Editor</text>
        <text x="90" y="76">(define (fib n)</text>
        <text x="140" y="112">(if (&lt; n 2) n</text>
        <text x="195" y="148">(+ (fib (- n 1))</text>
        <text x="235" y="184">(fib (- n 2)))))</text>
        <text x="90" y="256">(print (fib 10))</text>
      </g>

      <rect x="820" y="416" width="140" height="44" rx="6" fill="#22c55e" />
      <text x="890" y="444" font-family="sans-serif" font-weight="bold" font-size="16" fill="#ffffff" text-anchor="middle">Run Buffer</text>
    </g>

    <text x="990" y="586" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="end">Ln 7, Col 17</text>

    <g transform="translate(20, 600)">
      <rect width="980" height="100" rx="6" fill="#111418" stroke="#30363d" stroke-width="2" />
      <text x="30" y="40" font-family="monospace" font-size="20" fill="#d3d7cf">55</text>
    </g>
  </g>
</svg>
